name: Monthly Brief draft

# Drafts NEXT month's AIEL Monitor Brief and emails it to Magnus for review,
# ~two weeks ahead of publication. Issues publish on the 12th, so the draft
# goes out on the 28th of the prior month. Also runnable on demand.
on:
  schedule:
    - cron: "0 7 28 * *"      # 28th, 07:00 UTC (~09:00 Europe/Stockholm) -> drafts next month, publish 12th
  workflow_dispatch: {}        # manual "Run workflow" button (for testing)

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Build next month's brief and email it
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 scripts/email_brief_draft.py
