# News / lab history — ported from ai-econlab.com (2026-07-20); links restored from the live
# Google site (2026-07-21). Each year: list of {date, text, links?:[{label,url}]}.
# text renders raw (may contain inline HTML); links render as chips after the text.
years:
  - year: 2026
    items:
      - {date: "Jun 24", text: 'The paper "Artificial Intelligence for Public Use" (Lodefalk, Engberg, Lidskog, Skargren & Tang) was accepted for publication in Digital Society.'}
      - date: "Jun 17"
        text: 'A column was published in ProMarket (Stigler Center, Chicago Booth), "AI Is Not Reducing Employment but Rather Who Gets Hired" (Lodefalk, Löthman, Koch & Engberg), drawing on the "Same Storm, Different Boats" paper.'
        links: [{label: "ProMarket", url: "https://www.promarket.org/2026/06/17/ai-is-not-reducing-employment-but-rather-who-gets-hired/"}]
      - {date: "Jun 10–11", text: 'The fourth conference on AI and white-collar work was held at Katrinelund outside Örebro: 27 participants, 12 papers, keynotes by Michael Lechner (St. Gallen) and Christina Gathmann (LISER / Luxembourg). Dates set for the AIEL/AISCAF 2028 conference, 14–15 June 2028.'}
      - date: "Mar 27"
        text: 'ORU working paper released: "Who Adopts AI? Evidence on Firms, Technologies and Workers" (Pulito, Pytlikova, Schroeder & Lodefalk).'
        links: [{label: "ORU WP", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2026/wp-3-2026.pdf"}]
      - date: "Mar 16"
        text: 'ORU and Ratio working papers released: "Same Storm, Different Boats: Generative AI and the Age Gradient in Hiring" (Lodefalk, Löthman, Koch & Engberg), with an accompanying op-ed with the labour-market partners'' AI council in DN.'
        links: [{label: "ORU WP", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2026/wp-2-2026.pdf"}, {label: "Ratio WP", url: "https://cms.ratio.se/app/uploads/2026/03/lodefalk_march16_paper_v2-kombinerades.pdf"}, {label: "DN op-ed", url: "https://www.dn.se/debatt/ja-ai-hotar-ungas-jobb-men-inte-som-vi-trott/"}]
      - date: "Mar 7"
        text: 'A one-page summary released of the forthcoming "Same Storm, Different Boats" working paper on AI and workers across age groups.'
        links: [{label: "One-pager", url: "https://magnus-l.github.io/canaries-sweden/onepager/onepager.pdf"}]
  - year: 2025
    items:
      - date: "Dec 29"
        text: "Call for papers published for the fourth AIEL conference on AI and White-Collar Work, jointly arranged with the Swedish research cluster AISCAF."
        links: [{label: "Call for papers", url: "/assets/conferences/CfP_AIEL_2026.pdf"}]
      - date: "Nov 14"
        text: 'Lodefalk interviewed on Swedish Public Radio, discussing the new working paper "The Effects of Artificial Intelligence on Jobs: Evidence from an AI Subsidy Program" (with Hellsten, Khanna & Yakymovych), out on ORU, Ratio, IZA and GLO.'
        links: [{label: "Sveriges Radio", url: "https://www.sverigesradio.se/avsnitt/kommer-ai-ta-ditt-jobb"}, {label: "ORU WP", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2025/wp-13-2025.pdf"}, {label: "Ratio WP", url: "https://cms.ratio.se/app/uploads/2025/11/working-paper-386-1.pdf"}, {label: "IZA DP", url: "https://www.iza.org/publications/dp/18267/the-effects-of-artificial-intelligence-on-jobs-evidence-from-an-ai-subsidy-program"}, {label: "GLO DP", url: "https://ideas.repec.org/p/zbw/glodps/1692.html"}]
      - {date: "Oct", text: "Kyvik-Nordås & Klügl's paper on cross-border data flows and AI uptake accepted for publication in Structural Change and Economic Dynamics."}
      - {date: "Sep", text: 'Kyvik-Nordås presents "How productivity differences drive trade and technology uptake" (with Klügl) at ETSG (and later at Univ. of Oslo, 9 Nov).'}
      - {date: "Sep 8", text: "New PhD student Lydia Löthman joins the lab, based at Örebro University."}
      - date: "Sep 1"
        text: "The AI-Econ Lab became part of, and via Örebro University a node for, the new Swedish research cluster on AI, Structural Change and the Future of Work (AISCAF), funded by WASP-HS. Five-year financing; other nodes are Uppsala University and Stockholm University."
        links: [{label: "AISCAF", url: "https://www.aiscaf.se/w/ac/"}, {label: "WASP-HS", url: "https://wasp-hs.org"}]
      - date: "Jul 8"
        text: 'Paper published in Research Policy: "Artificial Intelligence, Tasks, Skills and Wages: Worker-Level Evidence from Germany" (Engberg, Koch, Lodefalk & Schroeder).'
        links: [{label: "DOI", url: "https://doi.org/10.1016/j.respol.2025.105285"}]
      - date: "May 28"
        text: "The AI-Econ Lab became part of the new Center for AI, Robotics and Cybersecurity (ARC) at Örebro University."
        links: [{label: "ARC", url: "https://www.oru.se/var-profil/arc---centrum-for-ai-robotik-och-cybersakerhet/"}]
      - date: "May 7"
        text: 'Paper published in Applied Economics Letters: "Artificial Intelligence, Hiring and Employment: Job Postings Evidence from Sweden" (Hellsten, Engberg, Javed, Lodefalk, Sabolová, Schroeder & Tang).'
        links: [{label: "DOI", url: "https://doi.org/10.1080/13504851.2025.2497431"}]
      - date: "May 2"
        text: "A new book (chapter 3 with Kyvik-Nordås) published by OECD/BCG/INSEAD: The Adoption of Artificial Intelligence in Firms: New Evidence for Policymaking."
        links: [{label: "OECD report", url: "https://www.oecd.org/en/publications/the-adoption-of-artificial-intelligence-in-firms_f9ef33c3-en/full-report.html"}]
      - date: "Apr 30"
        text: "Mark Hellsten successfully defended his PhD thesis in Economics on automation (including AI) and work at Aarhus University, Denmark."
        links: [{label: "Thesis", url: "https://pure.au.dk/ws/portalfiles/portal/425010533/Hellsten_PHD_Dissertation_Final.pdf"}]
      - date: "Apr 3"
        text: "A commissioned report on AI in the public sector (Lodefalk, Engberg & Tang) was launched at the Ministry of Finance, Stockholm, focusing on productivity and labour demand; op-ed in Dagens Industri."
        links: [{label: "ESO report", url: "https://eso.expertgrupp.se/rapporter/2025_2_-algoritmer-for-allman-nytta/"}, {label: "DI op-ed", url: "https://www.di.se/debatt/brist-pa-ai-ledarskap-hammar-offentlig-sektor/"}]
      - date: "Apr 3"
        text: 'A new working paper on AI in the public sector released at Örebro University ("Artificial Intelligence for Public Use"; Lodefalk, Engberg, Lidskog & Tang).'
        links: [{label: "ORU WP", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2025/wp-6-2025.pdf"}]
      - date: "Feb 5"
        text: 'Paper published in Digital Society: "Artificial Intelligence and Worker Stress" (Lodefalk & Koch).'
        links: [{label: "Article", url: "https://rdcu.be/d8No5"}]
      - {date: "Feb 1", text: "Professor Michael Lechner joins the lab and Örebro University as a guest professor."}
