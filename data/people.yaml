        role: "Postdoctoral researcher"
        aff: "Statistics Sweden · Örebro University · Ratio"
        url: "https://sites.google.com/view/markgranberg/"
        photo: ""
        bio: "Analysed the impact of AI on wages, the hiring process of organisations using field experiments, and the role of economic uncertainty on unemployment flows."
      - name: "Holger Görg"
