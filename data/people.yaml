groups:
  - name: "Core team"
    members:
      - name: "Magnus Lodefalk"
        role: "Associate professor; co-director"
        aff: "Örebro University · Ratio · Global Labor Organization (GLO)"
        url: "https://www.magnuslodefalk.com"
        photo: ""
        bio: "Co-director of the AI-Econ Lab. For over a decade worked with longitudinal register data for Swedish firms and workers, studying structural changes and technological adoption."
      - name: "Hildegunn Kyvik-Nordås"
        role: "Professor; co-director"
        aff: "Örebro University · Council on Economic Policies · NUPI"
        url: "https://www.oru.se/english/employee/hildegunn_kyvik-nordas"
        photo: ""
        bio: "Co-directs the AI-Econ Lab. Works on trade, trade policy and technology issues, focusing on the interaction between trade policy, technology and labour market adjustments."
      - name: "Erik Engberg"
        role: "PhD student"
        aff: "Örebro University · Ratio"
        url: "https://www.oru.se/english/employee/erik_engberg"
        photo: ""
        bio: "Most recently worked as an analyst at Growth Analysis, analysing and reporting on trade, innovation policy, venture capital, entrepreneurship and evaluations of public support to enterprises."
