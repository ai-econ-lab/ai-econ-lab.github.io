# Site-wide config: brand, nav, links, footer. Edit here, run build.py, push.
brand:
  name: "AI-Econ Lab"
  monogram: "AIEL"
  tagline: "Örebro University · RATIO"
  domain: "ai-econlab.com"
  base_url: "https://ai-econlab.com"     # canonical host for <link rel=canonical> + sitemap
  description: >-
    An economics-led, multi-disciplinary research lab at Örebro University and RATIO,
    studying how artificial intelligence is reshaping the world of work.

# Top navigation. 'cta' renders as the filled button on the right.
nav:
  - {label: "Monitor",  href: "/monitor/"}
  - {label: "DAIOE",    href: "/daioe/"}
  - {label: "Research", href: "/research/"}
  - {label: "People",   href: "/people/"}
  - {label: "Events",   href: "/events/"}
  - {label: "News",     href: "/news/"}
  - {label: "About",    href: "/about/"}

# Instrument registration strip under the masthead (honesty-as-aesthetic).
# Monthly brief subscription (Substack). Clean subscribe URL (no referral/tracking params).
brief_subscribe: "https://aielmonitor.substack.com/subscribe"

registration:
  - "SOURCES <b>JobTech</b> · Eurostat · AI Index · SCB · EU-LFS · Akavia"
  - "<b>10.9M</b> SWEDISH ADS · 36 COUNTRIES"
  # Derived at build time from the numeric data files' last git commit — see
  # data_updated() in build.py. Do not hand-type a date here; it will drift.
  # The weekly claim is backed by .github/workflows/monitor-refresh.yml (Mondays):
  # API sources auto-refresh behind sanity gates; report/release sources are watched
  # and open a GitHub issue. Remove the claim if that Action is ever disabled.
  - "DATA UPDATED <b>{data_updated}</b> · SOURCES CHECKED WEEKLY"
  - '<span class="lv">● LIVE · PUBLIC + PARTNER DATA</span>'
  - "MONITOR PROTOTYPE"

# Organisations that share data with the lab. Credit, not funding: none of these
# fund the lab, and listing them implies no endorsement of our results.
data_partners:
  - name: "Akavia"
    url: "https://www.akavia.se/politik-paverkan/sakomraden/ai-digitalisering/"
    what: "Member web panel on AI and working life, 2023 onwards. Shared with the lab; we publish aggregates with attribution."
  - name: "Svea"
    url: ""
    what: "Firm survey on AI adoption, run by Novus. Internal use only at present."

affiliations: ["Örebro University · RATIO", "WASP-HS · AISCAF", "Sweden · Denmark · Portugal · Germany"]

links:
  monitor: "/monitor/"
  daioe: "/daioe/"                       # the DAIOE page (hosts the live Explorers)
  explorer: "/daioe/"                    # legacy alias used on home/about
  explorer_years: "https://huggingface.co/spaces/ai-econ-lab/daioe-explorer-years"
  explorer_months: "https://huggingface.co/spaces/ai-econ-lab/months"
  daioe_dataset: "https://github.com/ai-econ-lab/daioe_dataset"

footer:
  columns:
    - title: "Explore"
      links:
        - {label: "The AIEL Monitor", href: "/monitor/"}
        - {label: "DAIOE measure", href: "/daioe/"}
        - {label: "Research", href: "/research/"}
        - {label: "People", href: "/people/"}
        - {label: "Events & News", href: "/events/"}
    - title: "The lab"
      links:
        - {label: "About & contact", href: "/about/"}
        - {label: "AISCAF (WASP-HS cluster)", href: "https://www.aiscaf.se/w/ac/"}
        - {label: "WASP-HS", href: "https://wasp-hs.org"}
        - {label: "Örebro University", href: "https://www.oru.se"}
        - {label: "RATIO", href: "https://ratio.se"}
  contact: "Örebro University, SE-701 82 Örebro, Sweden"

# About-page content (lab description, book, contact). Preserved from the old site.
about_paras:
  - "The AI-Econ Lab was initiated in 2019 and is led by associate professor Magnus Lodefalk in cooperation with professor Hildegunn Kyvik-Nordås. A steering group is tied to the lab (Lodefalk, Kyvik-Nordås, Schroeder and Görg)."
  - "The lab is located at Örebro University, a hub for AI development in Sweden, and is part of the university's Center for AI, Robotics and Cybersecurity (ARC). It has two partner institutions, the Ratio Institute and the Swedish Entrepreneurship Forum."
  - "The lab is also a partner, and Örebro University a node, for the Swedish research cluster on AI, Structural Change and the Future of Work ([AISCAF](https://www.aiscaf.se/w/ac/)), funded by the Wallenberg AI, Autonomous Systems and Software Program – Humanity and Society ([WASP-HS](https://wasp-hs.org)). AISCAF is co-led with Uppsala University and Stockholm University."

book:
  title: "Artificial Intelligence and Work"
  author: "Magnus Lodefalk"
  year: 2024
  publisher: "Ratio Institute"
  url: "https://www.adlibris.com/se/bok/artificiell-intelligens-och-jobben-9789180598750"
  note: "A book on AI and working life (in Swedish, as Artificiell intelligens och jobben; English version pending). During autumn 2026 it becomes a living, updatable source linked to the Monitor."

contact:
  email: "magnus.lodefalk@oru.se"
  phone: "+46 (0)722 21 73 40"
  address: "Örebro University, SE-701 82 Örebro, Sweden"
  invite: "If you are interested in collaborating or writing an advanced thesis, send us an e-mail. There may be external funding for doctoral students and post-doctoral positions."
  links:
    - {label: "Find your way to Örebro University", href: "https://www.oru.se/english/about-us/find-your-way-here/"}

# Where finished pages are written (GitHub Pages serves from this folder).
build:
  out: "docs"
  emit_cname: false   # false = previewable at ai-econ-lab.github.io. Set true ONLY at the DNS-flip step.
