# AI in Demand — monitor content. Numbers are REAL (from the prototype).
# The builder/integrator/user split is a PREVIEW (not yet measured) — keep it flagged.

headline: "The AIEL Monitor"
lede: >-
  How artificial intelligence is reshaping work: measured internationally through a portable exposure
  measure (DAIOE) and public data, and in unusual depth for Sweden via job ads, firm surveys and
  administrative registers. One spine of four questions: how exposed the work is, how much employers
  demand AI, how far firms have adopted it, and what it means for jobs. Built on public data so every
  figure can be cited and refreshed automatically, and committed to no funder.

# Overview-first landing: one door per spine module (Exposure · Demand · Adoption · Outcomes).
# International-first headline number each; Sweden is the depth cut inside the module. Every figure dated.
overview:
  - {k: "Exposure", num: "30<span>%</span>", lab: "of European jobs are in the top-25% most AI-exposed occupations (by generative-AI exposure); Sweden 39%, 2nd-highest of 36", foot: "DAIOE genAI v2023 · EU-LFS", anchor: "#exposure", cls: ""}
  - {k: "Demand",   num: "1.9<span>%</span>", lab: "median share of job ads requiring AI across 22 countries in 2025 (Stanford AI Index); Sweden 2.8%", foot: "AI Index / Lightcast · 2025", anchor: "#demand", cls: "b"}
  - {k: "Adoption", num: "20<span>%</span>", lab: "of EU firms used AI in 2025, up from 8% in 2023 (Eurostat); Sweden 35%, among the leaders", foot: "Eurostat · 2025", anchor: "#adoption", cls: "c"}
  - {k: "Outcomes", num: "−5.3<span>pp</span>", lab: "Sweden's entry-level squeeze: fewer entry-level openings in the most AI-exposed jobs since 2020; the pattern echoes international research", foot: "JobTech · 2020–2025", anchor: "#outcomes", cls: "d"}

# The monitor's modules. 'live' has its own section below; 'next'/'planned'/'someday' are honest roadmap.
modules:
  - {name: "AI in Demand", status: "live", desc: "How often employers ask for AI skills in job ads, by occupation, sector and region over time."}
  - {name: "Occupations Explorer", status: "live", desc: "Swedish employment by occupation over time (and soon region), with DAIOE AI-exposure overlaid."}
  - {name: "Entry-level squeeze", status: "next", desc: "The young/entry-level share of openings in AI-exposed occupations: the canaries signal on vacancies."}
  - {name: "AI adoption & use", status: "planned", desc: "Firm and worker adoption from public SCB data and realized-use task views."}
  - {name: "Augmentation vs automation", status: "planned", desc: "Whether AI adds to or replaces the tasks of each occupation."}
  - {name: "Across countries", status: "live", desc: "Each country's workforce AI-exposure (DAIOE generative-AI v2023 × EU-LFS employment); Sweden in international context."}

# The AI in Demand module.
aiindemand_lede: >-
  How often Swedish employers ask for AI skills in their job ads, by year, by occupation, and
  soon by whether they want AI built, integrated, or simply used. We name the series by what
  the employer does, never by what the job is: ads that ask for AI skills, ads that name an
  AI skill. We deliberately avoid the phrase "AI jobs".

# Plain-language captions (Harford test). Use verbatim beneath every figure of each series.
captions:
  floor: >-
    The share of Swedish job ads that ask the person being hired to work with AI, naming a
    specific skill such as machine learning in the job's own requirements.
  specific: >-
    The share of Swedish job ads that mention a specific AI skill, such as machine learning,
    anywhere in the ad.
  guard: >-
    Ads that mention AI only when describing the company do not count; an ad counts for what
    it asks of the person being hired.
  floor_sv: >-
    Andelen svenska platsannonser som ber den som anställs att arbeta med AI, med en namngiven
    färdighet som maskininlärning bland tjänstens egna krav.
  specific_sv: >-
    Andelen svenska platsannonser som nämner en specifik AI-färdighet, som maskininlärning,
    någonstans i annonsen.

# Trend: the frozen-v1 series (fp 2f073672be5d998c). Two lines:
# values = ads that NAME a specific AI skill (whole text); floor_values = ads that ASK for
# AI skills in the role's own requirements. 2026 appended as H1-partial when Q1/Q2 land.
trend:
  years:  [2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]
  values: [0.058, 0.082, 0.076, 0.092, 0.078, 0.091, 0.096, 0.087, 0.105, 0.126, 0.174, 0.237, 0.402, 0.658, 0.711, 0.696, 0.606, 0.488, 0.752, 0.901, 1.121]
  floor_values: [0.020, 0.030, 0.028, 0.019, 0.026, 0.031, 0.032, 0.026, 0.035, 0.058, 0.086, 0.113, 0.179, 0.257, 0.301, 0.302, 0.256, 0.209, 0.327, 0.441, 0.500]
  provisionalFrom: 20   # 0-based index of the first provisional point (2026, when appended)
  ymax: 1.5
  yticks: [0, 0.5, 1, 1.5]

tiles:
  - {num: "0.90<span>%</span>", lab: "of 2025 job ads name a specific AI skill; 0.44% ask for it in the job's own requirements", foot: "frozen v1 · 2025", cls: ""}
  - {num: "15×", lab: "rise since 2006 in ads naming an AI skill (0.06% → 0.90%); the strict floor rose 22×", foot: "2006–2025 · Platsbanken", cls: "b"}
  - {num: "24.5", lab: "ads per 10,000 named a generative-AI skill in 2025, from near zero before 2023", foot: "27% of AI demand", cls: "c"}
  - {num: "−5.3<span>pp</span>", lab: "fewer entry-level openings in the most AI-exposed occupations", foot: "widening since 2020", cls: "d"}

# The live 60-day window: its own instrument, never a point on the archive line (no-splice).
livewindow:
  asof: "24 Jul 2026"
  n: "35,600"
  names_pct: "1.85"
  floor_pct: "0.89"
  sentence: >-
    Of the 35,600 most recent job ads, 1.85% name a specific AI skill and 0.89% ask for one in
    the job itself (each figure give or take about a tenth of a percentage point). These numbers
    run a little higher than the chart's, for two reasons we have measured: the live feed
    carries a somewhat different mix of ads than the yearly archives, and the archives store
    slightly shortened ad texts. Once we can calibrate the two against each other, they will
    join into one line that runs to today.

# Top ADVERTISEMENT TITLES (verbatim, from the candidate extracts: floor_top_titles.csv),
# plus taxonomy-level churn. Free-text neologism newcomers: next release.
titles:
  flag: "Ad titles · verbatim"
  intro: >-
    Where the demand sits, in the employers' own words. The same titles head the list year
    after year: machine learning engineer, data scientist, AI/ML developer. The one
    surprise sits just below them: medicinsk sekreterare, as speech recognition spreads
    through healthcare administration.
  top:
    - {year: "2026 · H1", items: ["Machine learning engineer", "Data scientist"]}
    - {year: 2025, items: ["AI/ML-utvecklare", "Machine learning engineer"]}
    - {year: 2024, items: ["Machine learning engineer", "Data scientist"]}
  newcomers:
    label: "New in AI demand, 2023"
    items: ["CEO / Managing director", "Auditor", "Environmental and climate strategist", "Data analyst", "Biostatistician", "IT coordinator"]
  cooled:
    label: "Cooled: no longer clear the bar"
    items: ["Telemarketer (2018)", "Construction engineer (2022)", "Mathematical statistician (2023)", "Inside sales (2024)", "Network technician (2024)"]
  caveat: >-
    Top titles are the advertisements' own headlines, as employers wrote them (lightly
    cleaned: employer and place names removed), counted among ads that ask for AI skills in
    the role itself; a vacancy posted more than once counts each time. The newcomer and
    cooled lists still use the employment service's occupation taxonomy (our English
    renderings), where an occupation "clears the bar" with at least five such ads in a
    year; free-text neologisms (the AI-steward class) arrive with the next release.

segmentation:
  flag: "Preview · not yet measured"
  intro: >-
    The next release splits AI-mentioning ads by what the worker does with AI.
    Our current lexical measure already hints at the split; the semantic layer,
    now training, will classify each ad properly.
  cards:
    - {name: "Builders",    color: "--c1", text: "Ads asking someone to create AI: ML engineers, data scientists, research roles requiring specific techniques."}
    - {name: "Integrators", color: "--c2", text: "Ads asking someone to wire AI in: software, MLOps and product roles that use AI components."}
    - {name: "Users",       color: "--c3", text: "Ads where AI is simply a tool of the job: marketing, admin, teaching, sales. The largest, fastest-growing tier."}

caveats:
  - "<b>2026 is partial</b>: the first half comes from the Q1–Q2 archives and the latest weeks from the live feed; the newest point will revise."
  - "The chart ends with the June archives; the live feed runs to today and joins the chart once the two sources are reconciled."
  - "<b>The 2022–2023 dip</b> coincides with the global tech-hiring downturn and a sharp expansion of total ad volume: read it as a market swing, not necessarily as falling AI intent per employer."
  - "The headline lines are deliberately strict: roughly 2.5 times as many ads mention AI in some form. That broad bound mixes genuine demand with company boilerplate in proportions that drift over time, so we publish it only after an era-specific correction, now in progress."
  - "Ads that mention AI only when describing the company never count; an ad counts for what it asks of the person being hired."
  - "Counts are advertisement entries as they appear in the public archives; the same vacancy can be posted more than once."
  - "The builder / integrator / user split is a <b>preview</b> and not yet a measured series."
