# Seminars — full list ported from ai-econlab.com/seminars (2026-07-20). VERIFY before go-live.
series:
  title: "AIEL brown-bag seminar series"
  intro: >-
    Since 2024 the AI-Econ Lab arranges a monthly, virtual brown-bag lunch research seminar. From
    autumn 2025 it is part of the Swedish research cluster on AI, Structural Change and the Future of
    Work (AISCAF), funded by WASP-HS. Internal or invited external researchers present work-in-progress
    and get feedback from colleagues.
  format:
    - "Monthly, online via Zoom"
    - "12:00–13:00 CET (12:30–13:30 from autumn 2026)"
    - "20–30 minutes presentation, then Q&A"
    - "Slots by invitation, first-come-first-served"
  contact: "Magnus Lodefalk, firstname.surname[at]oru.se"
  zoom: "https://oru-se.zoom.us/j/63703049171?pwd=aEx4Z213VDFxT2NDM1dQY2JwQ3ZtUT09"

