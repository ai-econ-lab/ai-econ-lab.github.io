    when: "14–15 June 2028"
    where: "Katrinelund, near Örebro, Sweden"
    hosts: "AI-Econ Lab · Örebro University · Ratio · WASP-HS AISCAF"
    organisers: "Lodefalk, Kyvik-Nordås, Längkvist, Schroeder, Görg"
