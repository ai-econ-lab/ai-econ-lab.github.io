# Seminars & events — ported from ai-econlab.com/seminars (2026-07-20). VERIFY before go-live.
series:
  title: "AIEL brown-bag seminar series"
  intro: >-
    A monthly, virtual brown-bag lunch research seminar. From autumn 2025 it is part of the
    Swedish research cluster on AI, Structural Change and the Future of Work (AISCAF), funded by
    WASP-HS. Internal or invited external researchers present work-in-progress and get feedback
    from colleagues.
  format:
    - "Monthly, online (Zoom link on request)"
    - "12:00–13:00 CET (12:30–13:30 from autumn 2026)"
    - "20–30 minutes presentation, then Q&A"
  contact: "Magnus Lodefalk, firstname.surname[at]oru.se"

