Artificial Intelligence for Public Use: This paper investigates the economic and societal
  impacts of Artificial Intelligence (AI) in the public sector, focusing on its potential
  to enhance productivity and mitigate labour shortages. Employing detailed administrative
  data and novel occupational exposure measures, we simulate future scenarios over
  a 20-year horizon, using Sweden as an illustrative case. Our findings indicate that
  advances in AI development and uptake could significantly alleviate projected labour
  shortages and enhance productivity. However, outcomes vary substantially across
  sectors and organisational types, driven by differing workforce compositions. Complementing
  the economic analysis, we identify key challenges that hinder AI’s effective deployment,
  including technical limitations, organisational barriers, regulatory ambiguity,
  and ethical risks such as algorithmic bias and lack of transparency. Drawing from
  an interdisciplinary conceptual framework, we argue that AI’s integration in the
  public sector must address these socio-technical and institutional factors comprehensively.
  To unlock AI’s full potential, substantial investments in technological infrastructure,
  human capital development, regulatory clarity, and robust governance mechanisms
  are essential. Our study thus contributes both novel economic evidence and an integrated
  societal perspective, informing strategies for sustainable and equitab
'Artificial Intelligence, Tasks, Skills and Wages: Worker-Level Evidence from Germany': This
  paper documents novel facts on within-occupation task and skill changes over the
  past two decades in Germany. In a second step, it reveals a distinct relationship
  between occupational work content and exposure to artificial intelligence (AI) and
  automation (robots). Workers in occupations with high AI exposure, perform different
  activities and face different skill requirements, compared to workers in occupations
  exposed to robots. In a third step, the study uses individual labour market biographies
  to investigate the impact on wages between 2010 and 2017. Results indicate a wage
  growth premium in occupations more exposed to AI, contrasting with a wage growth
  discount in occupations exposed to robots. Finally, the study further explores the
  dynamic influence of AI exposure on individual wages over time, uncovering positive
  associations with wages, with nuanced variations across occupational groups
'Artificial Intelligence, Hiring and Employment: Job Postings Evidence from Sweden': This
  paper investigates the impact of artificial intelligence (AI) on hiring and employment,
  using the universe of job postings published by the Swedish Public Employment Service
  from 2014-2022 and universal register data for Sweden. We construct a detailed measure
  of AI exposure according to occupational content and find that establishments exposed
  to AI are more likely to hire AI workers. Survey data further indicate that AI exposure
  aligns with greater use of AI services. Importantly, rather than displacing non-AI
  workers, AI exposure is positively associated with increased hiring for both AI
  and non-AI roles. In the absence of substantial productivity gains that might account
  for this increase, we interpret the positive link between AI exposure and non-AI
  hiring as evidence that establishments are using AI to augment existing roles and
  expand task capabilities, rather than to replace non-AI workers
'Artificial Intelligence and Worker Stress: Evidence from Germany': We use individual
  survey data providing detailed information on stress, technology adoption, and work,
  worker, and employer characteristics, in combination with recent measures of AI
  and robot exposure, to investigate how new technologies affect worker stress. We
  find a persistent negative relationship, suggesting that AI and robots could reduce
  the stress level of workers. We furthermore provide evidence on potential mechanisms
  to explain our findings. Overall, the results provide suggestive evidence of modern
  technologies changing the way we perform our work in a way that reduces stress and
  work pressure
Double Whammy? Trade and Automation in Engineering Services: 'This paper studies the
  role of trade for the joint uptake of AI-enabled automation in manufacturing and
  engineering. It develops an agent-based model (ABM) where the agents are heterogeneous
  manufacturers and engineering firms. The model features two technology-related business
  models: engineering as a face-to-face consultancy service and engineering as automated
  software. Switching to the software technology is costly for both manufacturers
  and engineers, but the cost declines with the number of firms having made the leap
  due to network effects. The simulations start with a scenario where all firms are
  in the consultancy business model and trace out the path of software adoption over
  time. The software adoption rate follows an S-shaped curve for manufacturers and
  a boom and bust cycle for engineers. Trade affects the cut-off productivity rate
  at which manufacturers switch technology, the shape of the adoption rate curve,
  and the incentives for engineers to develop software. In a two-country model with
  a high and low-wage country, the low wage country adopts software early and import
  consultancy services from the high-wage country, a pattern similar to China’s trade
  and AI development'
'Drivers of Automation and Consequences for Jobs in Engineering Services: An Agent-Based Modelling Approach': 'This
  paper studies the uptake of AI-driven automation and its impact on employment, using
  a dynamic agent-based model (ABM). It simulates the adoption of automation software
  as well as job destruction and job creation in its wake. There are two types of
  agents: manufacturing firms and engineering services firms. The agents choose between
  two business models: consulting or automated software. From the engineering firms’
  point of view, the model exhibits static economies of scale in the software model
  and dynamic (learning by doing) economies of scale in the consultancy model. From
  the manufacturing firms’ point of view, switching to the software model requires
  restructuring of production and there are network effects in switching. The ABM
  matches engineering and manufacturing agents and derives employment of engineers
  and the tasks they perform, i.e. consultancy, software development, software maintenance,
  or employment in manufacturing. Policy parameters influencing the results are occupational
  licensing and protection of intellectual property rights. We find that the uptake
  of software is gradual; slow in the first few years and then accelerates. Software
  is fully adopted after about 18 years in the base line run. The adoption rate is
  slower the higher the license fee for software, while the adoption rate is faster
  the higher the mark-up rate of consultancy. Employment of engi'
'AI Unboxed and Jobs: A Novel Measure and Firm-Level Evidence from Three Countries': We
  unbox developments in artificial intelligence (AI) to estimate how exposure to these
  developments affect firm-level labour demand, using detailed register data from
  Denmark, Portugal and Sweden over two decades. Based on data on AI capabilities
  and occupational work content, We develop and validate a time-variant measure for
  occupational exposure to AI across subdomains of AI, including language modelling.
  According to our model, white collar occupations are most exposed to AI, and especially
  white collar work that entails relatively little social interaction. We illustrate
  its usefulness by applying it to near-universal data on firms and individuals from
  Sweden, Denmark, and Portugal, and estimating firm labour demand regressions. We
  find a positive (negative) association between AI exposure and labour demand for
  highskilled white (blue) collar work. Overall, there is an up-skilling effect, with
  the share of white-collar to blue collar workers increasing with AI exposure. Exposure
  to AI within the subdomains of image and language are positively (negatively) linked
  to demand for high-skilled white collar (blue collar) work, whereas other AI-areas
  are heterogeneously linked to groups of workers
'The Effects of Artificial Intelligence on Jobs: Evidence from an AI Subsidy Program': Artificial
  intelligence (AI) is expected to reshape labor markets, yet causal evidence remains
  scarce. We exploit a novel Swedish subsidy program that encouraged small and mid-sized
  firms to adopt AI. Using a synthetic difference-in-differences design comparing
  awarded and non-awarded firms, we find that AI subsidies led to a sustained increase
  in job postings over five years, but with no statistically detectable change in
  employment. This pattern reflects hiring signals concentrated in AI occupations
  and white-collar roles. Our findings align with task-based models of automation,
  in which AI adoption reconfigures work and spurs demand for new skills, but hiring
  frictions and the need for complementary investments delay workforce expansion
'Same Storm, Different Boats: Generative AI and the Age Gradient in Hiring': We show
  that the age composition of employment within Swedish employers shifts after the
  arrival of generative AI, with no corresponding reduction in aggregate labour demand.
  Using 4.6 million job advertisements from Sweden’s largest recruitment platform,
  we find that the broad decline in postings since 2022 aligns with monetary tightening
  rather than AI, exploiting Sweden’s seven-month gap between the Riksbank’s first
  rate hike and the launch of ChatGPT as a timing test. We then use full-population
  employer– employee register data and an employer-level difference-in-differences
  design to estimate how AI exposure affects employment composition across six age
  groups. An event study documents an accelerating decline in employment of 22–25-year-olds
  in high-AI-exposure occupations, reaching 5.5 per cent by early 2025 relative to
  less exposed occupations within the same employers, while employment of workers
  over 50 rose by 1.3 per cent. The widening age gradient suggests that generative
  AI reshapes hiring composition rather than aggregate demand, with the adjustment
  burden falling disproportionately on entry-level workers
Returns to AI Skills: This paper assesses whether workers who develop and apply artificial
  intelligence experience a earnings premium. I link skill requirements specified
  in job vacancies to the individuals ultimately hired to fill those positions using
  a combination of Swedish job vacancy and matched employer-employee register data.
  By identifying positions that explicitly necessitate AI skills, this paper seeks
  to determine if a earnings premium is associated with these skills while controlling
  for other individual attributes. Findings suggest a significant earnings premium
  for individuals hired to positions requiring AI skills. Discerning between AI developers
  and AI users, the results indicate that the former group experiences a stronger
  earnings premium. The premium is partly driven by workers being hired into high-wage
  industries. However, transitioning into roles requiring AI skills does not result
  in additional earnings increases, indicating that firms do not engage in wage competition
  for these workers
