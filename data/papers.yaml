      - {label: "Data", url: "https://drive.google.com/drive/folders/16PwsyGY28iXnsGOIY7dzN6hDwwxIuHRV"}
    abstract: "We unbox developments in artificial intelligence (AI) to estimate how exposure to these developments affect firm-level labour demand, using detailed register data from Denmark, Portugal and Sweden over two decades. Based on data on AI capabilities and occupational work content, We develop and validate a time-variant measure for occupational exposure to AI across subdomains of AI, including language modelling. According to our model, white collar occupations are most exposed to AI, and especially white collar work that entails relatively little social interaction. We illustrate its usefulness by applying it to near-universal data on firms and individuals from Sweden, Denmark, and Portugal, and estimating firm labour demand regressions. We find a positive (negative) association between AI exposure and labour demand for highskilled white (blue) collar work. Overall, there is an up-skilling effect, with the share of white-collar to blue collar workers increasing with AI exposure. Exposure to AI within the subdomains of image and language are positively (negatively) linked to demand for high-skilled white collar (blue collar) work, whereas other AI-areas are heterogeneously linked to groups of workers"
  - title: "The Effects of Artificial Intelligence on Jobs: Evidence from an AI Subsidy Program"
    authors: "Hellsten, M., Khanna, S., Lodefalk, M. & Y. Yakymovych"
    year: 2025
    venue: "In review, Economic Journal"
    coverage:
      - {name: "Sveriges Radio", url: "https://www.sverigesradio.se/avsnitt/kommer-ai-ta-ditt-jobb"}
      - {name: "LLM Podcast"}
    links:
      - {label: "ORU WP 13/2025", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2025/wp-13-2025.pdf"}
      - {label: "Ratio WP 386", url: "https://cms.ratio.se/app/uploads/2025/11/working-paper-386-1.pdf"}
      - {label: "IZA DP 18267", url: "https://www.iza.org/publications/dp/18267/the-effects-of-artificial-intelligence-on-jobs-evidence-from-an-ai-subsidy-program"}
      - {label: "GLO DP 1692", url: "https://ideas.repec.org/p/zbw/glodps/1692.html"}
    abstract: "Artificial intelligence (AI) is expected to reshape labor markets, yet causal evidence remains scarce. We exploit a novel Swedish subsidy program that encouraged small and mid-sized firms to adopt AI. Using a synthetic difference-in-differences design comparing awarded and non-awarded firms, we find that AI subsidies led to a sustained increase in job postings over five years, but with no statistically detectable change in employment. This pattern reflects hiring signals concentrated in AI occupations and white-collar roles. Our findings align with task-based models of automation, in which AI adoption reconfigures work and spurs demand for new skills, but hiring frictions and the need for complementary investments delay workforce expansion"
  - title: "Same Storm, Different Boats: Generative AI and the Age Gradient in Hiring"
