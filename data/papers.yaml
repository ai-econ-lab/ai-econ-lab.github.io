      - {label: "Appendix", url: "https://github.com/Magnus-L/canaries-sweden/raw/main/paper/appendix.pdf"}
    abstract: "We show that the age composition of employment within Swedish employers shifts after the arrival of generative AI, with no corresponding reduction in aggregate labour demand. Using 4.6 million job advertisements from Sweden’s largest recruitment platform, we find that the broad decline in postings since 2022 aligns with monetary tightening rather than AI, exploiting Sweden’s seven-month gap between the Riksbank’s first rate hike and the launch of ChatGPT as a timing test. We then use full-population employer– employee register data and an employer-level difference-in-differences design to estimate how AI exposure affects employment composition across six age groups. An event study documents an accelerating decline in employment of 22–25-year-olds in high-AI-exposure occupations, reaching 5.5 per cent by early 2025 relative to less exposed occupations within the same employers, while employment of workers over 50 rose by 1.3 per cent. The widening age gradient suggests that generative AI reshapes hiring composition rather than aggregate demand, with the adjustment burden falling disproportionately on entry-level workers"
  - title: "Who Adopts AI? Evidence on Firms, Technologies and Workers"
    authors: "Pulito, G., Pytlikova, M., Schroeder, S. & M. Lodefalk"
    year: 2026
    venue: "Working paper"
    coverage: []
    links:
      - {label: "ORU WP 3/2026", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2026/wp-3-2026.pdf"}
      - {label: "IZA DP 18515", url: "https://docs.iza.org/dp18515.pdf"}
      - {label: "RFBerlin 26089", url: "https://www.rfberlin.com/wp-content/uploads/2026/03/26089.pdf"}
      - {label: "CERGE-EI WP 818", url: "https://www.cerge-ei.cz/pdf/wp/Wp818.pdf"}
    abstract: "Using two waves of nationally representative Danish firm surveys linked to employer–employee administrative registers, we study how adoption varies across artificial intelligence (AI) and related advanced technologies. We show that AI adoption is highly technology-specific. While firm size and digital infrastructure predict adoption broadly, workforce composition operates through distinct channels: STEM-educated workforces predict core AI adoption, whereas non-STEM university-educated workforces are associated with generative AI adoption, indicating different human capital complementarities. The factors associated with adoption differ from those predicting deployment breadth: firm size and digital maturity matter for both, whereas workforce composition primarily predicts adoption alone. Machine learning and natural language processing are deployed across multiple business functions, whereas other advanced technologies remain concentrated in specific operational domains. Individual-level evidence provides a foundation for these patterns, with awareness of workplace AI usage concentrated among managers and high-skilled workers. Self-reported AI knowledge is higher among younger and more educated individuals. Finally, commonly used occupational AI exposure measures vary substantially in their ability to predict observed adoption, with benchmark-based measures outperforming patent-based and LLM-focused alternatives. These findings show that treating AI as a monolithic category obscures economically meaningful variation in who adopts, what they deploy, and how well existing measures capture it."
