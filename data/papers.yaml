published:
  - title: "Artificial Intelligence for Public Use"
    authors: "Lodefalk, M., Engberg, E., Lidskog, R. & A. Tang"
    year: 2026
    venue: "Digital Society (accepted)"
    coverage:
      - {name: "Publikt", url: "https://www.publikt.se/fordjupning/pa-djupet/alla-paverkas-nar-ai-forandrar-arbetsmarknaden-27542"}
      - {name: "Dagens Industri (op-ed)", url: "https://www.di.se/debatt/brist-pa-ai-ledarskap-hammar-offentlig-sektor/"}
    links:
      - {label: "ORU WP 6/2025", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2025/wp-6-2025.pdf"}
      - {label: "Appendix", url: "https://drive.google.com/file/d/1hwLsobJjqwFmf28bE26DxbekuvqGmDDw/view"}
    abstract: "This paper investigates the economic and societal impacts of Artificial Intelligence (AI) in the public sector, focusing on its potential to enhance productivity and mitigate labour shortages. Employing detailed administrative data and novel occupational exposure measures, we simulate future scenarios over a 20-year horizon, using Sweden as an illustrative case. Our findings indicate that advances in AI development and uptake could significantly alleviate projected labour shortages and enhance productivity. However, outcomes vary substantially across sectors and organisational types, driven by differing workforce compositions. Complementing the economic analysis, we identify key challenges that hinder AI’s effective deployment, including technical limitations, organisational barriers, regulatory ambiguity, and ethical risks such as algorithmic bias and lack of transparency. Drawing from an interdisciplinary conceptual framework, we argue that AI’s integration in the public sector must address these socio-technical and institutional factors comprehensively. To unlock AI’s full potential, substantial investments in technological infrastructure, human capital development, regulatory clarity, and robust governance mechanisms are essential. Our study thus contributes both novel economic evidence and an integrated societal perspective, informing strategies for sustainable and equitable public-sector digitalisation"
  - title: "Artificial Intelligence, Tasks, Skills and Wages: Worker-Level Evidence from Germany"
    authors: "Engberg, E., Koch, M., Lodefalk, M. & S. Schroeder"
    year: 2025
    venue: "Research Policy (early online)"
    coverage: []
    links:
      - {label: "DOI", url: "https://doi.org/10.1016/j.respol.2025.105285"}
      - {label: "ORU WP 12/2023", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2023/wp-12-2023.pdf"}
      - {label: "Ratio WP 371", url: "https://ratio.se/publikationer/working-paper-no-371-artificial-intelligence-tasks-skills-and-wages-worker-level-evidence-from-germany"}
    abstract: "This paper documents novel facts on within-occupation task and skill changes over the past two decades in Germany. In a second step, it reveals a distinct relationship between occupational work content and exposure to artificial intelligence (AI) and automation (robots). Workers in occupations with high AI exposure, perform different activities and face different skill requirements, compared to workers in occupations exposed to robots. In a third step, the study uses individual labour market biographies to investigate the impact on wages between 2010 and 2017. Results indicate a wage growth premium in occupations more exposed to AI, contrasting with a wage growth discount in occupations exposed to robots. Finally, the study further explores the dynamic influence of AI exposure on individual wages over time, uncovering positive associations with wages, with nuanced variations across occupational groups"
  - title: "Artificial Intelligence, Hiring and Employment: Job Postings Evidence from Sweden"
    authors: "Engberg, E., Hellsten, M., Javed, F., Lodefalk, M., Sabolova, R., Schroeder, S. & A. Tang"
    year: 2025
    venue: "Applied Economics Letters (early online)"
    coverage: []
    links:
      - {label: "DOI", url: "https://doi.org/10.1080/13504851.2025.2497431"}
      - {label: "ORU WP 10/2024", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2024/wp-10-2024.pdf"}
      - {label: "Ratio WP 380", url: "https://cms.ratio.se/app/uploads/2024/11/wp-380.pdf"}
    abstract: "This paper investigates the impact of artificial intelligence (AI) on hiring and employment, using the universe of job postings published by the Swedish Public Employment Service from 2014-2022 and universal register data for Sweden. We construct a detailed measure of AI exposure according to occupational content and find that establishments exposed to AI are more likely to hire AI workers. Survey data further indicate that AI exposure aligns with greater use of AI services. Importantly, rather than displacing non-AI workers, AI exposure is positively associated with increased hiring for both AI and non-AI roles. In the absence of substantial productivity gains that might account for this increase, we interpret the positive link between AI exposure and non-AI hiring as evidence that establishments are using AI to augment existing roles and expand task capabilities, rather than to replace non-AI workers"
  - title: "Artificial Intelligence and Worker Stress: Evidence from Germany"
    authors: "Koch, M. & M. Lodefalk"
    year: 2025
    venue: "Digital Society, 4(5)"
    coverage:
      - {name: "Sveriges Radio", url: "https://www.sverigesradio.se/avsnitt/2570335"}
      - {name: "Realtid", url: "https://www.realtid.se/it-tech/overraskande-ai-fyndet-man-paverkas/"}
    links:
      - {label: "Article", url: "https://rdcu.be/d8No5"}
      - {label: "ORU WP 5/2024", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2024/wp-5-2024.pdf"}
      - {label: "Ratio WP 377", url: "https://cms.ratio.se/app/uploads/2024/06/wp-377-sammanfogad.pdf"}
    abstract: "We use individual survey data providing detailed information on stress, technology adoption, and work, worker, and employer characteristics, in combination with recent measures of AI and robot exposure, to investigate how new technologies affect worker stress. We find a persistent negative relationship, suggesting that AI and robots could reduce the stress level of workers. We furthermore provide evidence on potential mechanisms to explain our findings. Overall, the results provide suggestive evidence of modern technologies changing the way we perform our work in a way that reduces stress and work pressure"
  - title: "Double Whammy? Trade and Automation in Engineering Services"
    authors: "Kyvik-Nordås, H. & F. Klügl"
    year: 2024
    venue: "Review of International Economics"
    coverage: []
    links:
      - {label: "DOI", url: "https://doi.org/10.1111/roie.12743"}
      - {label: "ORU WP 16/2021", url: "https://www.oru.se/globalassets/oru-sv/institutioner/hh/workingpapers/workingpapers2021/wp-16-2021.pdf"}
    abstract: "This paper studies the role of trade for the joint uptake of AI-enabled automation in manufacturing and engineering. It develops an agent-based model (ABM) where the agents are heterogeneous manufacturers and engineering firms. The model features two technology-related business models: engineering as a face-to-face consultancy service and engineering as automated software. Switching to the software technology is costly for both manufacturers and engineers, but the cost declines with the number of firms having made the leap due to network effects. The simulations start with a scenario where all firms are in the consultancy business model and trace out the path of software adoption over time. The software adoption rate follows an S-shaped curve for manufacturers and a boom and bust cycle for engineers. Trade affects the cut-off productivity rate at which manufacturers switch technology, the shape of the adoption rate curve, and the incentives for engineers to develop software. In a two-country model with a high and low-wage country, the low wage country adopts software early and import consultancy services from the high-wage country, a pattern similar to China’s trade and AI development"
